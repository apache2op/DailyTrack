<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>DailyTrack</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/192.png">
  <!-- PNG Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/180.png">

  <!-- Optional: ICO fallback -->
  <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon">


</head>

<body>
  



  <div class="container">

    <h1>Hello User</h1>
    <h3>Welcome to Daily Track</h3>

    <div class="controls">

      <!-- ROW 1 -->
      <div class="controls-top">

        <div style="display:flex; align-items:center; gap:6px;">
          <select id="yearSelect"></select>
          <select id="monthSelect"></select>
        </div>

        <input type="text" id="habitName" placeholder="Enter habit name">

        <div class="color-picker">
          <input type="color" id="habitColor">
          <div id="colorCircle"></div>
        </div>

        

      </div>

      <!-- ROW 2 -->
      <div class="controls-bottom">
        <button id="addBtn">Add</button>
        <button onclick="downloadCSV()">Export</button>
        <button onclick="toggleTheme()" id="themeBtn">🌙</button>
      </div>

    </div>

    <div id="tracker"></div>
    <div id="emptyState"></div>

    <div id="habitList" class="habit-row"></div>

  </div>


  <!-- 🔥 HABIT DETAIL VIEW -->
  <div id="detailView" style="display:none; padding:15px;">

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <button onclick="goBack()">← Back</button>
      <button onclick="toggleTheme()" id="themeBtnDetail">🌙</button>
    </div>

    <h2 id="detailTitle"></h2>

    <div id="detailDays"></div>

  </div>

  <div id="noteTooltip"></div>






  <script src="script.js"></script>
  <script src="habitDetail.js"></script>
  
</body>

</html>
